# sweetspot daemon configuration; server #11, multithread

# inner interface name (which is close to users)
inner-interface bond0.12
inner-gw-ip 10.40.15.3
# outer interface name (which is close to Internet)
outer-interface bond0.2
outer-gw-ip 194.154.70.67

# user IP CIDRs (managed by DHCP)
user-networks 172.31.8.0/22 172.31.40.0/22 172.31.72.0/22 192.168.253.0/25 172.16.8.0/22 172.16.48.0/21 172.16.104.0/22 172.16.136.0/22 172.16.192.0/20 172.17.64.0/19 172.18.16.0/21 172.18.80.0/21 172.18.160.0/20 172.25.16.0/21 172.25.80.0/21 172.25.144.0/21 172.25.208.0/21 172.27.24.0/21 172.27.80.0/21 172.27.160.0/20 172.28.64.0/19 172.29.64.0/19 100.65.16.0/21 100.65.80.0/21 100.65.144.0/21 100.65.208.0/21

# SNAT public networks
snat-public-networks 194.186.188.0/24 87.229.242.64/27 195.239.200.64/27 212.46.218.64/27 195.239.50.64/27 128.75.232.64/27 81.9.115.64/27 128.75.230.64/27 195.239.169.64/27 188.66.38.64/27 188.66.39.64/27

# UAM server address
uam-server-address 194.154.70.103

# UAM server port
uam-server-port 3990

# Filter reload interval (in secs)
filter-reload-interval 600

# Stats print interval (in secs)
stats-print-interval 60

# Captive filter
filter-anonymous default

#quantity of outer-inner threads (thread_qnty mod 2 should be 0) 
thread_qnty 16

local-networks 127.0.0.1/32